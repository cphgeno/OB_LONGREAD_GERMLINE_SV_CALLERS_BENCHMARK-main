metric_collectors:
  - id: truvari-consistency-ins
    name: "Truvari-consistency-ins"
    software_environment: "Truvari"
    repository:
      url: https://github.com/cphgeno/OB_LONGREAD_GERMLINE_SV_CALLERS_BENCHMARK-truvari-consistency.git
      commit: 7c83335
    inputs:
      - split-types.ins.vcf.gz
    outputs:
      - id: truvari-consistency-ins-test.consistency.flag
        path: "{input}/truvari_consistency.ins.flag"
  - id: truvari-consistency-del
    name: "Truvari-consistency-del"
    software_environment: "Truvari"
    repository:
      url: https://github.com/cphgeno/OB_LONGREAD_GERMLINE_SV_CALLERS_BENCHMARK-truvari-consistency.git
      commit: 7c83335
    inputs:
      - split-types.del.vcf.gz
    outputs:
      - id: truvari-consistency-del.consistency.flag
        path: "{input}/truvari_consistency.del.flag"
  - id: truvari-consistency-inv
    name: "Truvari-consistency-inv"
    software_environment: "Truvari"
    repository:
      url: https://github.com/cphgeno/OB_LONGREAD_GERMLINE_SV_CALLERS_BENCHMARK-truvari-consistency.git
      commit: 7c83335
    inputs:
      - split-types.inv.vcf.gz
    outputs:
      - id: truvari-consistency-inv.consistency.flag
        path: "{input}/truvari_consistency.inv.flag"

stages:
  - id: data
    modules:
      - id: NA12877.GRCh38.haplotagged
        name: "Collect input bams"
        software_environment: "Python"
        repository:
          url: https://github.com/cphgeno/OB_LONGREAD_GERMLINE_SV_CALLERS_BENCHMARK-data-input.git
          commit: 3e7b355
      - id: NA12878.GRCh38.haplotagged
        name: "Collect input bams"
        software_environment: "Python"
        repository:
          url: https://github.com/cphgeno/OB_LONGREAD_GERMLINE_SV_CALLERS_BENCHMARK-data-input.git
          commit: 3e7b355
      - id: NA12879.GRCh38.haplotagged
        name: "Collect input bams"
        software_environment: "Python"
        repository:
          url: https://github.com/cphgeno/OB_LONGREAD_GERMLINE_SV_CALLERS_BENCHMARK-data-input.git
          commit: 3e7b355
      - id: NA12881.GRCh38.haplotagged
        name: "Collect input bams"
        software_environment: "Python"
        repository:
          url: https://github.com/cphgeno/OB_LONGREAD_GERMLINE_SV_CALLERS_BENCHMARK-data-input.git
          commit: 3e7b355
      - id: NA12882.GRCh38.haplotagged
        name: "Collect input bams"
        software_environment: "Python"
        repository:
          url: https://github.com/cphgeno/OB_LONGREAD_GERMLINE_SV_CALLERS_BENCHMARK-data-input.git
          commit: 3e7b355
      - id: NA12885.GRCh38.haplotagged
        name: "Collect input bams"
        software_environment: "Python"
        repository:
          url: https://github.com/cphgeno/OB_LONGREAD_GERMLINE_SV_CALLERS_BENCHMARK-data-input.git
          commit: 3e7b355
      - id: NA12886.GRCh38.haplotagged
        name: "Collect input bams"
        software_environment: "Python"
        repository:
          url: https://github.com/cphgeno/OB_LONGREAD_GERMLINE_SV_CALLERS_BENCHMARK-data-input.git
          commit: 3e7b355
    outputs:
      - id: data.linear.bam
        path: "{dataset}.linear.bam"
      - id: data.linear.bam.bai
        path: "{dataset}.linear.bam.bai"
      - id: data.graph.bam
        path: "{dataset}.graph.bam"
      - id: data.graph.bam.bai
        path: "{dataset}.graph.bam.bai"
      - id: data.gam
        path: "{dataset}.gam"
      - id: data.asm.hap1
        path: "{dataset}.asm.bp.hap1.p_ctg.gfa"
      - id: data.asm.hap2
        path: "{dataset}.asm.bp.hap2.p_ctg.gfa"
      - id: data.truthset
        path: "{dataset}.truthset.vcf.gz"
      - id: data.truthset.tbi
        path: "{dataset}.truthset.vcf.gz.tbi"
      - id: data.reference
        path: "{dataset}.reference.fasta"
      - id: data.reference.fai
        path: "{dataset}.reference.fasta.fai"

  - id: variant_calling
    modules:
      - id: cutesv
        name: "Variant calling with CuteSV"
        software_environment: "CuteSV"
        repository:
          url: https://github.com/cphgeno/OB_LONGREAD_GERMLINE_SV_CALLERS_BENCHMARK-variant-calling-cutesv.git
          commit: 9ea4a23
        parameters:
          - values: ["--workflow", "linear"]
          - values: ["--workflow", "graph"]
      - id: debreak
        name: "Variant calling with DeBreak"
        software_environment: "DeBreak"
        repository:
          url: https://github.com/cphgeno/OB_LONGREAD_GERMLINE_SV_CALLERS_BENCHMARK-variant-calling-debreak.git
          commit: 1e9e332
        parameters:
          - values: ["--workflow", "linear"]
          - values: ["--workflow", "graph"]
      - id: delly2
        name: "Variant calling with Delly2"
        software_environment: "Delly2"
        repository:
          url: https://github.com/cphgeno/OB_LONGREAD_GERMLINE_SV_CALLERS_BENCHMARK-variant-calling-delly2.git
          commit: 631ff2d
        parameters:
          - values: ["--workflow", "linear"]
          - values: ["--workflow", "graph"]
      - id: dysgu
        name: "Variant calling with Dysgu"
        software_environment: "Dysgu"
        repository:
          url: https://github.com/cphgeno/OB_LONGREAD_GERMLINE_SV_CALLERS_BENCHMARK-variant-calling-dysgu.git
          commit: 79d960b
        parameters:
          - values: ["--workflow", "linear"]
          - values: ["--workflow", "graph"]
      - id: kled
        name: "Variant calling with Kled"
        software_environment: "Kled"
        repository:
          url: https://github.com/cphgeno/OB_LONGREAD_GERMLINE_SV_CALLERS_BENCHMARK-variant-calling-kled.git
          commit: f7f352c
        parameters:
          - values: ["--workflow", "linear"]
          - values: ["--workflow", "graph"]
      - id: sawfish2
        name: "Variant calling with Sawfish2"
        software_environment: "Sawfish2"
        repository:
          url: https://github.com/cphgeno/OB_LONGREAD_GERMLINE_SV_CALLERS_BENCHMARK-variant-calling-sawfish2.git
          commit: 6c34789
        parameters:
          - values: ["--workflow", "linear"]
          - values: ["--workflow", "graph"]
      - id: severus
        name: "Variant calling with Severus"
        software_environment: "Severus"
        repository:
          url: https://github.com/cphgeno/OB_LONGREAD_GERMLINE_SV_CALLERS_BENCHMARK-variant-calling-severus.git
          commit: d5668f6
        parameters:
          - values: ["--workflow", "linear"]
          - values: ["--workflow", "graph"]
      - id: sniffles2
        name: "Variant calling with Sniffles2"
        software_environment: "Sniffles2"
        repository:
          url: https://github.com/cphgeno/OB_LONGREAD_GERMLINE_SV_CALLERS_BENCHMARK-variant-calling-sniffles2.git
          commit: 002fea9
        parameters:
          - values: ["--workflow", "linear"]
          - values: ["--workflow", "graph"]
      - id: svim
        name: "Variant calling with SVIM"
        software_environment: "SVIM"
        repository:
          url: https://github.com/cphgeno/OB_LONGREAD_GERMLINE_SV_CALLERS_BENCHMARK-variant-calling-svim.git
          commit: 8e857a8
        parameters:
          - values: ["--workflow", "linear"]
          - values: ["--workflow", "graph"]
      - id: PAV
        name: "Variant calling with PAV"
        software_environment: "PAV"
        repository:
          url: https://github.com/cphgeno/OB_LONGREAD_GERMLINE_SV_CALLERS_BENCHMARK-variant-calling-pav.git
          commit: 600a361
        parameters:
          - values: ["--workflow", "assemblies"] 
      - id: VGcall
        name: "Variant calling with VGcall"
        software_environment: "VGcall"
        repository:
          url: https://github.com/cphgeno/OB_LONGREAD_GERMLINE_SV_CALLERS_BENCHMARK-variant-calling-vgcall.git
          commit: de27f4e
        parameters:
          - values: ["--workflow", "gam"] 
      - id: SVision
        name: "Variant calling with SVision"
        software_environment: "SVision"
        repository:
          url: https://github.com/cphgeno/OB_LONGREAD_GERMLINE_SV_CALLERS_BENCHMARK-variant-calling-svision.git
          commit: a0ca46c
        parameters:
          - values: ["--workflow", "linear"]
          - values: ["--workflow", "graph"]
    inputs:
      - entries:
        - data.linear.bam
        - data.linear.bam.bai
        - data.graph.bam
        - data.graph.bam.bai
        - data.gam
        - data.asm.hap1
        - data.asm.hap2
        - data.truthset
        - data.truthset.tbi
        - data.reference
        - data.reference.fai
    outputs:
      - id: variant_calling.vcfs
        path: "{dataset}.vcf"

  - id: vcf-postprocessing  
    modules:
      - id: Postprocessing
        name: "Postprocessing"
        software_environment: "Bcftools-samtools"
        repository:
          url: https://github.com/cphgeno/OB_LONGREAD_GERMLINE_SV_CALLERS_BENCHMARK-vcf-postprocessing.git
          commit: b54ccfd
    inputs:
      - entries: variant_calling.vcfs
    outputs:
      - id: variant_calling.vcfs.gz
        path: "{dataset}.vcf.gz"

  - id: truvari
    modules:
      - id: Truvari
        name: "Truvari"
        software_environment: "Truvari"
        repository:
          url: https://github.com/cphgeno/OB_LONGREAD_GERMLINE_SV_CALLERS_BENCHMARK-truvari-bench.git
          commit: 3ba80fa
    inputs:
      - entries: 
        - variant_calling.vcfs.gz
        - data.truthset
        - data.reference
    outputs:
      - id: variant_calling_metrics.fp
        path: "{dataset}.fp.vcf.gz"
      - id: variant_calling_metrics.fn
        path: "{dataset}.fn.vcf.gz"
      - id: variant_calling_metrics.tp
        path: "{dataset}.tp-base.vcf.gz"
      - id: variant_calling_metrics.tp.tbi
        path: "{dataset}.tp-base.vcf.gz.tbi"
      - id: variant_calling_metrics.summary
        path: "{dataset}.summary.json"

  - id: split-types-ins
    modules:
      - id: Split-types-ins
        name: "split-types-ins"
        software_environment: "Bcftools-samtools"
        repository:
          url: https://github.com/cphgeno/OB_LONGREAD_GERMLINE_SV_CALLERS_BENCHMARK-split-svtypes.git
          commit: 188f1bc
        parameters:
          - values: ["--sv_type", "INS"]
    inputs:
      - entries: 
        - variant_calling_metrics.tp
        - variant_calling_metrics.tp.tbi
    outputs:
      - id: split-types.ins.vcf.gz
        path: "{dataset}.INS.tp-base.vcf.gz"

  - id: split-types-inv
    modules:
      - id: Split-types-inv
        name: "split-types-inv"
        software_environment: "Bcftools-samtools"
        repository:
          url: https://github.com/cphgeno/OB_LONGREAD_GERMLINE_SV_CALLERS_BENCHMARK-split-svtypes.git
          commit: 188f1bc
        parameters:
          - values: ["--sv_type", "INV"]
    inputs:
      - entries: 
        - variant_calling_metrics.tp
        - variant_calling_metrics.tp.tbi
    outputs:
      - id: split-types.inv.vcf.gz
        path: "{dataset}.INV.tp-base.vcf.gz"

  - id: split-types-del
    modules:
      - id: Split-types-del
        name: "split-types-del"
        software_environment: "Bcftools-samtools"
        repository:
          url: https://github.com/cphgeno/OB_LONGREAD_GERMLINE_SV_CALLERS_BENCHMARK-split-svtypes.git
          commit: 188f1bc
        parameters:
          - values: ["--sv_type", "DEL"]
    inputs:
      - entries: 
        - variant_calling_metrics.tp
        - variant_calling_metrics.tp.tbi
    outputs:
      - id: split-types.del.vcf.gz
        path: "{dataset}.DEL.tp-base.vcf.gz"

